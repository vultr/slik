name: "Unit/Coverage Tests"

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests and coverage test
        id: test-coverage
        run: |
          set +e
          go test -coverprofile=coverage.out -cover ./... -v > output.txt 2>&1
          status=$?
          cat output.txt
          exit "$status"

      - name: Transform output
        id: results
        if: always()
        run: |
          if [[ ! -f output.txt ]]; then
            echo "No test output was produced." > output.txt
          fi
          CONTENT=$(cat output.txt)
          CONTENT="${CONTENT//'%'/'%25'}"
          CONTENT="${CONTENT//$'\n'/'%0A'}"
          CONTENT="${CONTENT//$'\r'/'%0D'}"
          echo content=$CONTENT >> $GITHUB_OUTPUT

      - name: Add PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const output = `### Unit Tests and Coverage
            <details><summary>Show Output</summary>

            \`\`\`
            ${{ steps.results.outputs.content }}
            \`\`\`
            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
