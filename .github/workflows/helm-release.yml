name: Release Helm Chart

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release-helm-chart:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Release helm-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Parse release version
        id: release
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          pattern='^Release helm-([0-9]+\.[0-9]+\.[0-9]+) #(major|minor|patch)( \(#[0-9]+\))?$'
          if [[ ! "${COMMIT_MESSAGE}" =~ ${pattern} ]]; then
            echo "::error::Helm release commits must match: Release helm-X.Y.Z #major|#minor|#patch"
            exit 1
          fi

          echo "version=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"

      - name: Set chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.release.outputs.version }}/" helm/slik/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.0

      - name: Lint chart
        run: helm lint ./helm/slik -f ./helm/slik/values.yaml

      - name: Render chart
        run: helm template slik ./helm/slik -f ./helm/slik/values.yaml --kube-version 1.36.0

      - name: Publish chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
          config: .cr.yaml
          mark_as_latest: false
          pages_branch: gh-pages
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
